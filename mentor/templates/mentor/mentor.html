{% extends "base.html" %}
{% load static %}

{% block content %}

<h1>AI Mentor</h1>

<div class="chat-wrapper">

    <!-- CHAT AREA -->

    <div id="chat-box" class="chat-box">

        <div class="bot-message">
            👋 Hi! I'm your Competitive Programming Mentor.
            <br><br>
            Ask me about:
            <ul>
                <li>Dynamic Programming</li>
                <li>Graphs</li>
                <li>Codeforces strategy</li>
                <li>LeetCode preparation</li>
            </ul>
        </div>

    </div>


    <!-- INPUT AREA -->

    <div class="chat-input">

        <input
            id="chat-input"
            type="text"
            placeholder="Ask something about algorithms..."
            autocomplete="off"
        >

        <button id="send-btn">Send</button>

    </div>

</div>



<script>

/* ---------- ELEMENTS ---------- */

const chatBox = document.getElementById("chat-box");
const input = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");


/* ---------- AUTO SCROLL ---------- */

function scrollToBottom(){
    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });
}


/* ---------- CSRF TOKEN ---------- */

function getCookie(name){

    let cookieValue = null;

    if(document.cookie && document.cookie !== ""){

        const cookies = document.cookie.split(";");

        for(let i=0;i<cookies.length;i++){

            const cookie = cookies[i].trim();

            if(cookie.substring(0,name.length+1) === (name+"=")){

                cookieValue = decodeURIComponent(cookie.substring(name.length+1));
                break;

            }

        }

    }

    return cookieValue;
}


/* ---------- ADD USER MESSAGE ---------- */

function addUserMessage(message){

    const div = document.createElement("div");

    div.className = "user-message";
    div.innerText = message;

    chatBox.appendChild(div);

    scrollToBottom();

}


/* ---------- ADD BOT MESSAGE ---------- */

function addBotMessage(message){

    const div = document.createElement("div");

    div.className = "bot-message";
    div.innerText = message;

    chatBox.appendChild(div);

    scrollToBottom();

}


/* ---------- SEND MESSAGE ---------- */

async function sendMessage(){

    const message = input.value.trim();

    if(message === "") return;

    addUserMessage(message);

    input.value = "";

    sendBtn.disabled = true;


    try{

        const response = await fetch("/mentor/chat/",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "X-CSRFToken":getCookie("csrftoken")
            },

            body:JSON.stringify({
                message:message
            })

        });

        const data = await response.json();

        addBotMessage(data.reply);

    }
    catch(error){

        addBotMessage("⚠️ Error contacting AI mentor.");

    }

    sendBtn.disabled = false;

}


/* ---------- EVENTS ---------- */

sendBtn.addEventListener("click", sendMessage);


input.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        e.preventDefault();
        sendMessage();

    }

});


/* ---------- INITIAL SCROLL ---------- */

window.onload = scrollToBottom;

</script>


{% endblock %}
